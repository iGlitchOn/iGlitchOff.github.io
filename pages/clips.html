<main class="main">
<header class="page-header">
  <div><h1 class="page-title">🎞 Clips</h1><p class="page-sub" id="clipsSubtitle">Cargando...</p></div>
  <div class="header-right"><button class="btn" onclick="loadClips()">↺ Recargar</button></div>
</header>
<div class="alert" id="alertBanner" style="display:none"><span id="alertMsg"></span><button onclick="this.parentElement.style.display='none'">✕</button></div>
<div id="clipsGrid" class="clips-grid">
  <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)">
    <div class="spin"></div><p style="margin-top:12px">Cargando clips...</p>
  </div>
</div>
</main>
<script src="../js/db.js"></script>
<script src="../js/kick-api.js"></script>
<script>
const CHANNEL='iglitchoff';
async function loadClips() {
  const grid=document.getElementById('clipsGrid');
  grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)"><div class="spin"></div><p style="margin-top:12px">Cargando clips...</p></div>';
  try {
    await KickDB.open();
    const clips=await KickAPI.getAllClips(CHANNEL);
    document.getElementById('clipsSubtitle').textContent=clips.length?`${clips.length} clips públicos`:('No se encontraron clips');
    if(!clips.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)">No se encontraron clips públicos en este canal.</div>';return;}
    // Sort by views
    clips.sort((a,b)=>(b.views||0)-(a.views||0));
    grid.innerHTML=clips.map(c=>{
      const url=c.url||`https://kick.com/${CHANNEL}?clip=${c.id}`;
      return `<a class="clip-card" href="${url}" target="_blank" rel="noopener">
        <div class="clip-thumb">
          ${c.thumbnail?`<img src="${c.thumbnail}" alt="${c.title}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=clip-ph>🎬</div>'">`:`<div class="clip-ph">🎬</div>`}
          <div class="clip-play"><div class="clip-play-btn"><svg width="14" height="16" viewBox="0 0 14 16" fill="#000"><path d="M0 0l14 8L0 16V0z"/></svg></div></div>
        </div>
        <div class="clip-info">
          <div class="clip-title">${c.title||'Sin título'}</div>
          <div class="clip-meta">
            ${c.views?`<span>👁 ${fmtNum(c.views)}</span>`:''}
            ${c.duration?`<span>⏱ ${fmtDur(c.duration)}</span>`:''}
            ${c.category?`<span class="badge bg" style="font-size:9px">${c.category}</span>`:''}
            ${c.createdAt?`<span>${fmtDate(c.createdAt)}</span>`:''}
          </div>
        </div>
      </a>`;
    }).join('');
  } catch(e) {
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)">Error: ${e.message}</div>`;
  }
}
document.addEventListener('DOMContentLoaded',loadClips);
</script>
</body></html>
